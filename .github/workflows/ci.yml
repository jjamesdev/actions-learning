name: Anatomía del workflow

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Variables a nivel de workflow completo
env:
  NODE_ENV: production
  APP_NAME: mi-app
  
jobs:

  contextos:
    runs-on: ubuntu-latest
      

    steps:
      - uses: actions/checkout@v4

      - name: Contexto github
        env:
          APP_VERSION: 1.0.0
        run: |
          echo "── contexto github ──"
          echo "actor:     ${{ github.actor }}"
          echo "repo:      ${{ github.repository }}"
          echo "evento:    ${{ github.event_name }}"
          echo "ref:       ${{ github.ref }}"
          echo "ref_name:  ${{ github.ref_name }}"
          echo "sha corto: ${GITHUB_SHA::7}"
          echo "run_id:    ${{ github.run_id }}"

      - name: Contexto env
        env:
          BUILD_DATE: "2026-04-14"
        run: |
          echo "── contexto env ──"
          echo "NODE_ENV:    ${{ env.NODE_ENV }}"
          echo "APP_NAME:    ${{ env.APP_NAME }}"
          echo "APP_VERSION: ${{ env.APP_VERSION }}"
          echo "BUILD_DATE:  ${{ env.BUILD_DATE }}"
          echo "VERSION_TAG: ${{ env.APP_NAME }}-${{ env.APP_VERSION }}-${GITHUB_SHA::7}"

      - name: Contexto runner
        run: |
          echo "── contexto runner ──"
          echo "os:   ${{ runner.os }}"
          echo "arch: ${{ runner.arch }}"
          echo "temp: ${{ runner.temp }}"

      - name: Contexto job
        run: |
          echo "── contexto job ──"
          echo "status: ${{ job.status }}"
