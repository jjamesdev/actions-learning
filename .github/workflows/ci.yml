name: Anatomía del workflow

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_ENV: production
  APP_NAME: mi-app

jobs:

  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js con cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar versión instalada
        run: |
          node --version
          npm --version
          echo "Cache dir: $(npm config get cache)"

      - name: Lint
        run: |
          echo "Corriendo lint sobre el código..."
          echo "Lint OK"

      - name: Tests
        run: |
          echo "Corriendo tests..."
          echo "Tests OK — 0 failures"

      - name: Resumen con versión trazable
        env:
          VERSION: "1.0.0"
        run: |
          echo "Build: ${{ env.APP_NAME }}-${VERSION}-${GITHUB_SHA::7}"