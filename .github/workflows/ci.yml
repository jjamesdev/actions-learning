name: Anatomía del workflow

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ── JOB 1 ─────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ejecutar lint
        run: |
          echo "Corriendo lint..."
          echo "Lint OK — sin errores de estilo"

  # ── JOB 2 ─────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ejecutar tests
        run: |
          echo "Corriendo tests..."
          echo "Tests OK — 42 passed, 0 failed"

  # ── JOB 3 ─────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Construir el proyecto
        run: |
          echo "Construyendo el proyecto..."
          echo "Build OK — artefacto generado"

  # ── JOB 4 ─────────────────────────────
  resumen:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Resumen del pipeline
        run: |
          echo "✓ Pipeline completado"
          echo "lint   → ${{ needs.lint.result }}"
          echo "test   → ${{ needs.test.result }}"
          echo "build  → ${{ needs.build.result }}"
